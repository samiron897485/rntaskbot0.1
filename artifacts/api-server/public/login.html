<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - L1 Earning System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo .icon {
      font-size: 2.8rem;
      display: block;
      margin-bottom: 8px;
    }
    .logo h1 {
      color: #00d4aa;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .logo p {
      color: #64748b;
      font-size: 0.82rem;
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 6px;
      margin-top: 18px;
    }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #00d4aa;
    }
    .btn-login {
      width: 100%;
      padding: 13px;
      margin-top: 24px;
      background: linear-gradient(135deg, #00d4aa, #00a07c);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(255,68,68,0.1);
      border: 1px solid #ff4444;
      border-radius: 8px;
      color: #ff8080;
      font-size: 0.85rem;
      display: none;
      text-align: center;
    }
    .error-msg.show { display: block; }
    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <span class="icon">🔧</span>
      <h1>L1 Admin Panel</h1>
      <p>Secure Admin Access</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter admin username" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter admin password" autocomplete="current-password" required />

      <button type="submit" class="btn-login" id="loginBtn">🔐 Login</button>
    </form>

    <div class="error-msg" id="errorMsg"></div>

    <div class="footer-note">🔒 Protected admin area</div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      if (!username || !password) {
        err.textContent = '❌ Please enter username and password';
        err.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Logging in...';
      err.classList.remove('show');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'same-origin',
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/admin';
        } else {
          err.textContent = '❌ ' + (data.message || 'Invalid credentials');
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = '🔐 Login';
        }
      } catch (ex) {
        err.textContent = '❌ Connection error. Please try again.';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = '🔐 Login';
      }
    }
  </script>
</body>
</html>
